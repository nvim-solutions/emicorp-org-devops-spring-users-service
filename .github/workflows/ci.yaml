name: CI - Build, Publish and Bump Platform

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/users-service
  PLATFORM_REPO: nvim-solutions/emicorp-org-devops-platform

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.compute-tag.outputs.tag }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compute the canonical tag to deploy
        id: compute-tag
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/v}"
            echo "Triggered by git tag, canonical tag = $TAG"
          else
            TAG="sha-$(git rev-parse --short HEAD)"
            echo "Triggered by branch push, canonical tag = $TAG"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  bump-prod:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout platform repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PLATFORM_REPO }}
          token: ${{ secrets.PLATFORM_REPO_TOKEN }}

      - name: Update image.tag in prod values
        env:
          NEW_TAG: ${{ needs.build.outputs.image-tag }}
        run: |
          yq -i ".image.tag = strenv(NEW_TAG)" environments/prod/users-service.values.yaml
          echo "--- Updated file ---"
          cat environments/prod/users-service.values.yaml

      - name: Create pull request (prod bump, manual review)
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PLATFORM_REPO_TOKEN }}
          commit-message: "release(prod): bump users-service to ${{ needs.build.outputs.image-tag }}"
          branch: release/users-service-${{ needs.build.outputs.image-tag }}
          base: main
          title: "release(prod): bump users-service → ${{ needs.build.outputs.image-tag }}"
          body: |
            Production release candidate.

            - Source git tag: `${{ github.ref_name }}`
            - Source commit: ${{ github.sha }}
            - New image: `ghcr.io/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image-tag }}`
            - Target environment: **prod**

            **Manual review required.** Verify dev has been stable with this version before merging.
          labels: |
            automated
            environment:prod
            release
          delete-branch: true